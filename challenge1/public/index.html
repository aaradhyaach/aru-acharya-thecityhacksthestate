<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CriticalAsset · 345 East 15th Street Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #242836;
      --border: #2e3346;
      --text: #e4e7ef;
      --text-muted: #8b92a8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── Header ─────────────────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .header .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ─── Main Layout ────────────────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 0;
      height: calc(100vh - 65px);
    }

    .main.detail-closed {
      grid-template-columns: 1fr;
    }

    .content {
      padding: 24px 32px;
      overflow-y: auto;
    }

    /* ─── Counter Cards ──────────────────────────────────────────────── */
    .counters {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .counter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .counter-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .counter-card.active {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.08);
    }

    .counter-card .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .counter-card .value {
      font-size: 32px;
      font-weight: 700;
    }

    .counter-card .sublabel {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .counter-card.open .value { color: var(--info); }
    .counter-card.progress .value { color: var(--warning); }
    .counter-card.overdue .value { color: var(--danger); }
    .counter-card.total .value { color: var(--text); }

    /* ─── Filters ────────────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--text);
      width: 250px;
      outline: none;
      margin-left: auto;
    }

    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    /* ─── Table ──────────────────────────────────────────────────────── */
    .table-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 12px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      text-align: left;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    tbody tr {
      cursor: pointer;
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: var(--surface-2);
    }

    tbody tr.selected {
      background: rgba(99, 102, 241, 0.1);
    }

    tbody td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    /* ─── Badges ─────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .badge-open { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .badge-to-do { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .badge-in-progress { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
    .badge-completed { background: rgba(16, 185, 129, 0.15); color: #34d399; }
    .badge-overdue { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    .badge-cancelled { background: rgba(107, 114, 128, 0.15); color: #9ca3af; }

    .priority-high { color: var(--danger); font-weight: 600; }
    .priority-medium { color: var(--warning); }
    .priority-low { color: var(--text-muted); }

    /* ─── Detail Panel ───────────────────────────────────────────────── */
    .detail-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px;
    }

    .detail-panel.hidden { display: none; }

    .detail-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      float: right;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .detail-close:hover { background: var(--surface-2); color: var(--text); }

    .detail-panel h2 {
      font-size: 18px;
      margin-bottom: 20px;
      padding-right: 40px;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .detail-row .label { color: var(--text-muted); }
    .detail-row .value { font-weight: 500; }

    .detail-description {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-muted);
      padding: 12px;
      background: var(--surface-2);
      border-radius: 8px;
    }

    /* ─── Student Signal ─────────────────────────────────────────────── */
    .signal-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .signal-section h3 {
      font-size: 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .signal-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      color: var(--text);
      resize: vertical;
      min-height: 80px;
      outline: none;
      font-family: inherit;
    }

    .signal-input:focus { border-color: var(--accent); }

    .signal-btn {
      margin-top: 10px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      color: #fff;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
      width: 100%;
    }

    .signal-btn:hover { background: var(--accent-hover); }

    .signal-success {
      margin-top: 10px;
      padding: 10px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      font-size: 13px;
      color: var(--success);
      display: none;
    }

    /* ─── Building Summary ───────────────────────────────────────────── */
    .buildings-section {
      margin-top: 24px;
    }

    .building-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .building-bar .name {
      flex: 1;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .building-bar .bar {
      width: 100px;
      height: 6px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
    }

    .building-bar .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .building-bar .count {
      font-size: 12px;
      font-weight: 600;
      min-width: 24px;
      text-align: right;
    }

    /* ─── Loading State ──────────────────────────────────────────────── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      padding: 40px;
      text-align: center;
      color: var(--danger);
    }

    /* ─── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .main { grid-template-columns: 1fr; }
      .detail-panel { 
        position: fixed; 
        right: 0; 
        top: 65px; 
        bottom: 0; 
        width: 400px;
        box-shadow: -4px 0 24px rgba(0,0,0,0.4);
        z-index: 50;
      }
      .counters { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>
      <span class="logo">CA</span>
      345 E 15th St · Work Orders
    </h1>
    <div class="status">
      <span class="status-dot"></span>
      <span id="connectionStatus">Connecting...</span>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="main detail-closed" id="mainLayout">
    <!-- Content Area -->
    <div class="content">
      <!-- Counter Cards -->
      <div class="counters">
        <div class="counter-card open" data-filter="open" onclick="filterByStatus('open')">
          <div class="label">Open</div>
          <div class="value" id="countOpen">—</div>
          <div class="sublabel">Awaiting action</div>
        </div>
        <div class="counter-card progress" data-filter="in_progress" onclick="filterByStatus('in_progress')">
          <div class="label">In Progress</div>
          <div class="value" id="countProgress">—</div>
          <div class="sublabel">Being worked on</div>
        </div>
        <div class="counter-card overdue" data-filter="overdue" onclick="filterByStatus('overdue')">
          <div class="label">Overdue</div>
          <div class="value" id="countOverdue">—</div>
          <div class="sublabel">Past due date</div>
        </div>
        <div class="counter-card total" data-filter="all" onclick="filterByStatus('all')">
          <div class="label">Total</div>
          <div class="value" id="countTotal">—</div>
          <div class="sublabel">All work orders</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="toolbar">
        <button class="filter-btn active" data-priority="all" onclick="filterByPriority('all')">All Priorities</button>
        <button class="filter-btn" data-priority="high" onclick="filterByPriority('high')">🔴 High</button>
        <button class="filter-btn" data-priority="medium" onclick="filterByPriority('medium')">🟡 Medium</button>
        <button class="filter-btn" data-priority="low" onclick="filterByPriority('low')">🟢 Low</button>
        <input type="text" class="search-input" placeholder="Search work orders..." oninput="searchWorkOrders(this.value)">
      </div>

      <!-- Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Asset</th>
              <th>Location</th>
              <th>Due Date</th>
            </tr>
          </thead>
          <tbody id="workOrderTable">
            <tr>
              <td colspan="6">
                <div class="loading">
                  <div class="spinner"></div>
                  <span>Loading work orders...</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Top Buildings by Open Work Orders -->
      <div class="buildings-section">
        <h3 style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin: 20px 0 12px;">Top Buildings by Open Work Orders</h3>
        <div id="buildingsList"></div>
      </div>
    </div>

    <!-- Detail Panel -->
    <div class="detail-panel hidden" id="detailPanel">
      <button class="detail-close" onclick="closeDetail()">&times;</button>
      <div id="detailContent"></div>
    </div>
  </div>

  <script>
    // ─── State ─────────────────────────────────────────────────────────
    let allWorkOrders = [];
    let filteredWorkOrders = [];
    let currentFilter = { status: 'all', priority: 'all', search: '' };
    let selectedWorkOrder = null;

    // ─── API Base URL ──────────────────────────────────────────────────
    const API_BASE = window.location.origin;

    // ─── Initialize ────────────────────────────────────────────────────
    async function init() {
      try {
        // Check health
        const health = await fetch(`${API_BASE}/api/health`).then(r => r.json());
        
        if (!health.hasCredentials) {
          document.getElementById('connectionStatus').textContent = '⚠️ No credentials configured';
          document.getElementById('connectionStatus').style.color = '#f59e0b';
          // Load demo data for development
          loadDemoData();
          return;
        }

        document.getElementById('connectionStatus').textContent = 'Connected to CriticalAsset';
        
        // Fetch work orders
        const data = await fetch(`${API_BASE}/api/workorders?limit=100`).then(r => r.json());
        
        if (data.error) {
          throw new Error(data.error);
        }

        allWorkOrders = data.nodes || [];
        applyFilters();
      } catch (error) {
        console.error('Init error:', error);
        document.getElementById('connectionStatus').textContent = 'Demo Mode';
        document.getElementById('connectionStatus').style.color = '#f59e0b';
        loadDemoData();
      }
    }

    // ─── Demo Data ─────────────────────────────────────────────────────
    function loadDemoData() {
      allWorkOrders = [
        { id: 'ee4cacef-08e3-58e6-a94f-e0ff32c5e6f5', title: 'Annual Steam System Inspection', description: 'Perform comprehensive annual inspection of the steam pressure reducing valve station and safety relief valves.', severity: 'high', executionPriority: 'high', workOrderStage: { name: 'To Do' }, workOrderServiceCategory: 'hvac', createdAt: '2026-05-30T09:00:00Z', dueDate: '2026-06-10T17:00:00Z', asset: { id: '602454ae-2f73-5e90-a688-87945cc0b6e8', name: 'Steam Pressure Reducing Valve Station', category: 'HVAC / Steam', status: 'active' }, location: { id: '6bbaf32c-707e-5bae-a59e-447e8aff1efc', locationName: '345 East 15th Street', address: '345 E 15th St, New York, NY' }, assignee: { id: 'U-01', name: 'Assigned Tech' } },
        { id: '29c750cd-7929-524a-ab7c-b3e1e965b0fd', title: 'Electrical Distribution Panel Preventive Maintenance', description: 'Conduct thermal imaging and tighten connections on main switchboard and distribution panels.', severity: 'medium', executionPriority: 'medium', workOrderStage: { name: 'To Do' }, workOrderServiceCategory: 'electrical', createdAt: '2026-05-30T09:00:00Z', dueDate: '2026-06-07T17:00:00Z', asset: { id: '1ac4e575-2686-503e-a9b7-20df593ae553', name: 'Main Switchboard', category: 'Electrical', status: 'active' }, location: { id: '6bbaf32c-707e-5bae-a59e-447e8aff1efc', locationName: '345 East 15th Street', address: '345 E 15th St, New York, NY' }, assignee: { id: 'U-02', name: 'Assigned Tech' } },
        { id: 'c5338071-972b-5dc2-a676-cefade0b4838', title: 'Emergency Exit Sign & Lighting Test', description: 'Perform mandatory emergency exit signage and battery unit discharge test.', severity: 'critical', executionPriority: 'critical', workOrderStage: { name: 'To Do' }, workOrderServiceCategory: 'fire_and_life_safety', createdAt: '2026-05-30T09:00:00Z', dueDate: '2026-06-15T17:00:00Z', asset: { id: 'b082f439-6d72-5e2f-a3ff-371db1aac811', name: 'Exit Sign', category: 'Fire & Life Safety', status: 'active' }, location: { id: '6bbaf32c-707e-5bae-a59e-447e8aff1efc', locationName: '345 East 15th Street', address: '345 E 15th St, New York, NY' }, assignee: { id: 'U-03', name: 'Assigned Tech' } },
      ];
      applyFilters();
    }

    // ─── Filtering ─────────────────────────────────────────────────────
    function applyFilters() {
      const now = new Date();
      
      filteredWorkOrders = allWorkOrders.filter(wo => {
        // Status filter
        if (currentFilter.status !== 'all') {
          const stage = wo.workOrderStage?.name?.toLowerCase().replace(/\s/g, '_') || 'open';
          if (currentFilter.status === 'overdue') {
            if (!wo.dueDate || new Date(wo.dueDate) >= now) return false;
            if (stage === 'completed' || stage === 'cancelled') return false;
          } else if (currentFilter.status === 'open' && stage !== 'open' && stage !== 'to_do' && stage !== 'to do') {
            return false;
          } else if (currentFilter.status === 'in_progress' && stage !== 'in_progress' && stage !== 'in progress') {
            return false;
          }
        }

        // Priority filter
        if (currentFilter.priority !== 'all') {
          const priority = (wo.severity || wo.executionPriority || '').toLowerCase();
          if (currentFilter.priority === 'high' && priority !== 'high' && priority !== 'critical') return false;
          if (currentFilter.priority === 'medium' && priority !== 'medium') return false;
          if (currentFilter.priority === 'low' && priority !== 'low') return false;
        }

        // Search filter
        if (currentFilter.search) {
          const search = currentFilter.search.toLowerCase();
          const searchable = [
            wo.title, wo.description, wo.asset?.name, wo.asset?.category,
            wo.location?.locationName, wo.assignee?.name
          ].filter(Boolean).join(' ').toLowerCase();
          if (!searchable.includes(search)) return false;
        }

        return true;
      });

      renderCounters();
      renderTable();
      renderBuildings();
    }

    function filterByStatus(status) {
      currentFilter.status = status;
      document.querySelectorAll('.counter-card').forEach(c => c.classList.remove('active'));
      document.querySelector(`.counter-card[data-filter="${status}"]`)?.classList.add('active');
      applyFilters();
    }

    function filterByPriority(priority) {
      currentFilter.priority = priority;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.filter-btn[data-priority="${priority}"]`)?.classList.add('active');
      applyFilters();
    }

    function searchWorkOrders(query) {
      currentFilter.search = query;
      applyFilters();
    }

    // ─── Render Functions ──────────────────────────────────────────────
    function renderCounters() {
      const now = new Date();
      const openStatuses = ['open', 'to do', 'to_do'];
      const open = allWorkOrders.filter(wo => openStatuses.includes(wo.workOrderStage?.name?.toLowerCase())).length;
      const inProgress = allWorkOrders.filter(wo => ['in progress', 'in_progress'].includes(wo.workOrderStage?.name?.toLowerCase())).length;
      const overdue = allWorkOrders.filter(wo => {
        const stage = wo.workOrderStage?.name?.toLowerCase();
        return wo.dueDate && new Date(wo.dueDate) < now && stage !== 'completed' && stage !== 'cancelled' && stage !== 'done';
      }).length;

      document.getElementById('countOpen').textContent = open;
      document.getElementById('countProgress').textContent = inProgress;
      document.getElementById('countOverdue').textContent = overdue;
      document.getElementById('countTotal').textContent = allWorkOrders.length;
    }

    function renderTable() {
      const tbody = document.getElementById('workOrderTable');
      
      if (filteredWorkOrders.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">No work orders match the current filters.</td></tr>`;
        return;
      }

      tbody.innerHTML = filteredWorkOrders.map(wo => {
        const status = wo.workOrderStage?.name || 'Unknown';
        const statusClass = status.toLowerCase().replace(/\s/g, '-');
        const priority = wo.severity || wo.executionPriority || 'Unknown';
        const priorityClass = priority.toLowerCase() === 'critical' ? 'high' : priority.toLowerCase();
        const isOverdue = wo.dueDate && new Date(wo.dueDate) < new Date() && statusClass !== 'completed';
        const dueDisplay = wo.dueDate ? new Date(wo.dueDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';

        return `
          <tr onclick="showDetail('${wo.id}')" class="${selectedWorkOrder?.id === wo.id ? 'selected' : ''}">
            <td style="max-width: 280px;">
              <div style="font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${wo.title}</div>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${wo.id}</div>
            </td>
            <td><span class="badge badge-${isOverdue ? 'overdue' : statusClass}">${isOverdue ? 'Overdue' : status}</span></td>
            <td><span class="priority-${priorityClass}">${priority}</span></td>
            <td style="font-size: 13px;">${wo.asset?.name || '—'}</td>
            <td style="font-size: 13px;">${wo.location?.locationName || '—'}</td>
            <td style="font-size: 13px; ${isOverdue ? 'color: var(--danger); font-weight: 600;' : ''}">${dueDisplay}</td>
          </tr>
        `;
      }).join('');
    }

    function renderBuildings() {
      const buildingCounts = {};
      allWorkOrders.forEach(wo => {
        if (wo.location?.locationName) {
          const stage = wo.workOrderStage?.name?.toLowerCase();
          if (stage === 'open' || stage === 'in progress') {
            buildingCounts[wo.location.locationName] = (buildingCounts[wo.location.locationName] || 0) + 1;
          }
        }
      });

      const sorted = Object.entries(buildingCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const max = sorted[0]?.[1] || 1;

      const container = document.getElementById('buildingsList');
      container.innerHTML = sorted.map(([name, count]) => `
        <div class="building-bar">
          <span class="name">${name}</span>
          <div class="bar"><div class="bar-fill" style="width: ${(count / max) * 100}%"></div></div>
          <span class="count">${count}</span>
        </div>
      `).join('');
    }

    // ─── Detail Panel ──────────────────────────────────────────────────
    function showDetail(id) {
      selectedWorkOrder = allWorkOrders.find(wo => wo.id === id);
      if (!selectedWorkOrder) return;

      const wo = selectedWorkOrder;
      const panel = document.getElementById('detailPanel');
      const layout = document.getElementById('mainLayout');
      
      panel.classList.remove('hidden');
      layout.classList.remove('detail-closed');

      const isOverdue = wo.dueDate && new Date(wo.dueDate) < new Date() && 
                        wo.workOrderStage?.name?.toLowerCase() !== 'completed';

      document.getElementById('detailContent').innerHTML = `
        <h2>${wo.title}</h2>
        
        <div class="detail-section">
          <h3>Details</h3>
          <div class="detail-row"><span class="label">ID</span><span class="value">${wo.id}</span></div>
          <div class="detail-row"><span class="label">Status</span><span class="value"><span class="badge badge-${isOverdue ? 'overdue' : wo.workOrderStage?.name?.toLowerCase().replace(/\s/g, '-')}">${isOverdue ? 'OVERDUE' : wo.workOrderStage?.name}</span></span></div>
          <div class="detail-row"><span class="label">Priority</span><span class="value priority-${(wo.severity || '').toLowerCase()}">${wo.severity || wo.executionPriority || '—'}</span></div>
          <div class="detail-row"><span class="label">Created</span><span class="value">${new Date(wo.createdAt).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</span></div>
          <div class="detail-row"><span class="label">Due</span><span class="value" style="${isOverdue ? 'color: var(--danger); font-weight: 600;' : ''}">${wo.dueDate ? new Date(wo.dueDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : '—'}</span></div>
          <div class="detail-row"><span class="label">Assigned To</span><span class="value">${wo.assignee?.name || 'Unassigned'}</span></div>
        </div>

        <div class="detail-section">
          <h3>Description</h3>
          <div class="detail-description">${wo.description || 'No description provided.'}</div>
        </div>

        ${wo.asset ? `
        <div class="detail-section">
          <h3>Linked Asset</h3>
          <div class="detail-row"><span class="label">Name</span><span class="value">${wo.asset.name}</span></div>
          <div class="detail-row"><span class="label">Category</span><span class="value">${wo.asset.category || '—'}</span></div>
          <div class="detail-row"><span class="label">Status</span><span class="value">${wo.asset.status || '—'}</span></div>
        </div>
        ` : ''}

        ${wo.location ? `
        <div class="detail-section">
          <h3>Location</h3>
          <div class="detail-row"><span class="label">Building</span><span class="value">${wo.location.locationName}</span></div>
          <div class="detail-row"><span class="label">Address</span><span class="value">${wo.location.address || '—'}</span></div>
        </div>
        ` : ''}

        <div class="signal-section">
          <h3>📡 Student Signal</h3>
          <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;">
            Attach a one-line observation from lived experience to this work order.
          </p>
          <textarea class="signal-input" id="signalInput" placeholder="e.g., The bathroom has been closed for 2 weeks. Water near the sink every morning."></textarea>
          <button class="signal-btn" onclick="submitSignal('${wo.id}')">Submit Signal</button>
          <div class="signal-success" id="signalSuccess">✓ Signal submitted and linked to ${wo.id}</div>
        </div>
      `;

      // Re-render table to show selected state
      renderTable();
    }

    function closeDetail() {
      document.getElementById('detailPanel').classList.add('hidden');
      document.getElementById('mainLayout').classList.add('detail-closed');
      selectedWorkOrder = null;
      renderTable();
    }

    // ─── Student Signal ────────────────────────────────────────────────
    async function submitSignal(workOrderId) {
      const input = document.getElementById('signalInput');
      const observation = input.value.trim();
      
      if (!observation) {
        input.style.borderColor = 'var(--danger)';
        setTimeout(() => input.style.borderColor = '', 2000);
        return;
      }

      try {
        await fetch(`${API_BASE}/api/signals`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            observation,
            buildingId: selectedWorkOrder?.location?.id,
            workOrderId,
            studentName: 'Hackathon Participant'
          })
        });

        document.getElementById('signalSuccess').style.display = 'block';
        input.value = '';
      } catch (error) {
        // In demo mode, still show success
        document.getElementById('signalSuccess').style.display = 'block';
        input.value = '';
      }
    }

    // ─── Boot ──────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
